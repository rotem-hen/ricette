<app-toasts aria-live="polite" aria-atomic="true"></app-toasts>

<div>
  @switch (authService.state) { @case (LoginState.Loading) {
  <div class="loading">
    <i class="fas fa-spin fa-circle-notch"></i>
  </div>
  } @default {
  <div>
    <router-outlet></router-outlet>
  </div>
  } }
</div>

<app-update-notification
  [class.notification-shown]="updateExist"
  [class.notification-hidden]="!updateExist"
></app-update-notification>
